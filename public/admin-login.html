<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Nottingham Park Houses</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: #1a3a2a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 8px;
    padding: 40px 44px;
    width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo h1 {
    font-size: 1.1rem;
    font-weight: normal;
    color: #1a3a2a;
    line-height: 1.4;
  }
  .logo span {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #6a8a7a;
    display: block;
    margin-top: 4px;
  }
  label {
    display: block;
    font-size: 0.78rem;
    color: #5a4a2a;
    margin-bottom: 5px;
    margin-top: 16px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #d0c8b0;
    border-radius: 4px;
    font-size: 0.9rem;
    font-family: inherit;
    background: #faf8f3;
    transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: #4a7c5a; }
  button[type=submit] {
    width: 100%;
    margin-top: 24px;
    padding: 11px;
    background: #1a3a2a;
    color: #e8dfc8;
    border: none;
    border-radius: 4px;
    font-size: 0.9rem;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.2s;
  }
  button[type=submit]:hover { background: #2c4a38; }
  button[type=submit]:disabled { background: #aaa; cursor: not-allowed; }
  .error {
    margin-top: 14px;
    padding: 9px 12px;
    background: #fff3f0;
    border: 1px solid #f5c6c0;
    border-radius: 4px;
    color: #8b2020;
    font-size: 0.82rem;
    display: none;
  }
  .back {
    display: block;
    text-align: center;
    margin-top: 18px;
    font-size: 0.78rem;
    color: #6a8a7a;
    text-decoration: none;
  }
  .back:hover { color: #1a3a2a; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Nottingham Park Houses</h1>
    <span>Admin Access</span>
  </div>
  <form id="loginForm">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" required>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
    <button type="submit" id="submitBtn">Sign in</button>
    <div class="error" id="errorMsg">Invalid username or password.</div>
  </form>
  <a href="/" class="back">← Back to map</a>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  err.style.display = 'none';

  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: document.getElementById('username').value,
      password: document.getElementById('password').value
    })
  });

  if (res.ok) {
    window.location.href = '/';
  } else {
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
});
</script>
</body>
</html>
