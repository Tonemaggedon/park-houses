<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People — Nottingham Park Houses</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f5f0e8; color: #2c2416; min-height: 100vh; }

  header {
    background: #1a3a2a; color: #e8dfc8;
    padding: 0 20px; height: 58px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 6px rgba(0,0,0,0.35); position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.2rem; font-weight: normal; }
  header h1 span { font-size: 0.75rem; display: block; color: #90b090; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
  nav { display: flex; gap: 6px; align-items: center; }
  nav a {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25);
    color: #e8dfc8; padding: 5px 13px; border-radius: 4px;
    cursor: pointer; font-size: 0.8rem; text-decoration: none; transition: background 0.2s;
  }
  nav a:hover { background: rgba(255,255,255,0.2); }
  nav a.active { background: #4a7c5a; border-color: #3a6a4a; }

  .toolbar {
    background: #2c4a38; padding: 14px 24px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .toolbar h2 { color: #e8dfc8; font-size: 1rem; font-weight: normal; margin-right: 8px; }
  .toolbar input, .toolbar select {
    padding: 7px 12px; border-radius: 4px; border: none;
    font-size: 0.85rem; font-family: Georgia, serif;
    background: rgba(255,255,255,0.92);
  }
  .toolbar input { width: 240px; }
  .toolbar .info { color: #90c090; font-size: 0.78rem; margin-left: auto; }

  .main { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }

  /* ── Person grid ── */
  .person-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .person-card {
    background: white; border: 1px solid #d8d0b8; border-radius: 8px;
    padding: 16px; cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    position: relative;
  }
  .person-card:hover { border-color: #8a6a2a; box-shadow: 0 3px 12px rgba(0,0,0,0.1); transform: translateY(-1px); }
  .person-card .card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .person-avatar {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    background: #4a7c5a; color: white; font-size: 1.1rem; font-weight: bold;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .person-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .person-card .card-name { font-size: 0.95rem; font-weight: bold; color: #1a3a2a; line-height: 1.3; }
  .person-card .card-dates { font-size: 0.76rem; color: #8a7a5a; margin-top: 2px; }
  .occ-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .occ-pill {
    background: #e8f0e0; color: #2a5a2a; padding: 2px 8px;
    border-radius: 10px; font-size: 0.72rem;
  }
  .occ-pill.servant { background: #f0ece0; color: #6a5a2a; }
  .person-card .card-props { font-size: 0.74rem; color: #8a7a5a; }
  .person-card .wiki-badge {
    position: absolute; top: 10px; right: 10px;
    background: #edf4f8; border: 1px solid #b0c8d8; border-radius: 3px;
    padding: 2px 6px; font-size: 0.68rem; color: #2a6090; text-decoration: none;
  }
  .person-card .wiki-badge:hover { background: #d8ecf8; }

  /* ── Person detail overlay ── */
  #personOverlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 500;
    overflow-y: auto;
  }
  #personOverlay.visible { display: block; }
  #personPane {
    background: #faf8f2; min-height: 100vh;
    max-width: 780px; margin: 0 auto;
    border-left: 1px solid #d0c090; border-right: 1px solid #d0c090;
    position: relative;
  }
  .pane-head {
    background: #1a3a2a; color: #e8dfc8;
    padding: 16px 24px; display: flex; align-items: flex-start; gap: 16px;
    position: sticky; top: 0; z-index: 10;
  }
  .pane-head-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: #4a7c5a; color: white; font-size: 1.3rem; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }
  .pane-head-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .pane-head-text { flex: 1; }
  .pane-head h2 { font-size: 1.15rem; font-weight: normal; line-height: 1.3; }
  .pane-head .pane-dates { font-size: 0.8rem; color: #90b890; margin-top: 3px; }
  .pane-head .close-btn { background: none; border: none; color: #90b890; font-size: 1.4rem; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; }
  .pane-head .close-btn:hover { color: white; }

  .pane-body { padding: 24px; }
  .pane-section { margin-bottom: 24px; }
  .pane-section h3 {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: #8a6a2a; border-bottom: 1px solid #e8d8a0; padding-bottom: 4px; margin-bottom: 12px;
  }
  .bio-text { font-size: 0.88rem; line-height: 1.75; color: #2a2a2a; }
  .bio-text p { margin-bottom: 10px; }
  .bio-text p:last-child { margin-bottom: 0; }

  .detail-grid { display: grid; grid-template-columns: 130px 1fr; gap: 5px 12px; font-size: 0.83rem; }
  .detail-grid .lbl { color: #8a7a5a; }
  .detail-grid .val { color: #1a1a1a; }

  /* Occupation timeline */
  .occ-timeline { }
  .occ-item {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 8px 0; border-bottom: 1px solid #f0e8d0;
  }
  .occ-item:last-child { border-bottom: none; }
  .occ-years { font-size: 0.75rem; color: #8a7a5a; min-width: 90px; flex-shrink: 0; padding-top: 2px; }
  .occ-title { font-size: 0.85rem; font-weight: bold; color: #1a3a2a; }
  .occ-employer { font-size: 0.78rem; color: #6a5a3a; margin-top: 2px; }
  .occ-notes { font-size: 0.76rem; color: #8a7a5a; margin-top: 2px; font-style: italic; }

  /* Census entries */
  .census-group { margin-bottom: 16px; }
  .census-year-badge {
    display: inline-block; background: #1a3a2a; color: #e8dfc8;
    padding: 3px 10px; border-radius: 3px; font-size: 0.75rem;
    margin-bottom: 8px; font-family: Arial, sans-serif;
  }
  .census-row {
    display: flex; gap: 8px; align-items: baseline;
    font-size: 0.83rem; padding: 5px 0; border-bottom: 1px solid #f0e8d0;
  }
  .census-row:last-child { border-bottom: none; }
  .census-role { color: #8a7a5a; min-width: 80px; font-size: 0.78rem; }
  .census-occ { flex: 1; }
  .census-prop {
    background: #e8f0e0; color: #1a4a2a; padding: 2px 8px;
    border-radius: 10px; font-size: 0.72rem; cursor: pointer;
    text-decoration: none; white-space: nowrap;
  }
  .census-prop:hover { background: #d0e8c0; }

  /* Relationships */
  .rel-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .rel-chip {
    display: flex; align-items: center; gap: 8px;
    background: white; border: 1px solid #d0c090; border-radius: 20px;
    padding: 5px 12px 5px 6px; cursor: pointer; transition: border-color 0.15s;
  }
  .rel-chip:hover { border-color: #8a6a2a; }
  .rel-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: #4a7c5a; color: white; font-size: 0.7rem;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .rel-name { font-size: 0.8rem; color: #1a3a2a; }
  .rel-type { font-size: 0.7rem; color: #8a7a5a; }

  /* Places */
  .place-item {
    background: white; border: 1px solid #d8d0b8; border-radius: 6px;
    padding: 12px 14px; margin-bottom: 8px;
  }
  .place-item h4 { font-size: 0.88rem; color: #1a3a2a; margin-bottom: 4px; }
  .place-item .place-conn { font-size: 0.76rem; color: #8a6a2a; font-style: italic; margin-bottom: 4px; }
  .place-item .place-loc { font-size: 0.78rem; color: #8a7a5a; }
  .place-item a { font-size: 0.76rem; color: #4a7c5a; text-decoration: none; }
  .place-item a:hover { text-decoration: underline; }

  /* Bibliography */
  .bib-item {
    padding: 8px 0; border-bottom: 1px solid #f0e8d0; font-size: 0.83rem;
  }
  .bib-item:last-child { border-bottom: none; }
  .bib-title { font-style: italic; color: #1a1a1a; }
  .bib-year { color: #8a7a5a; font-size: 0.76rem; margin-top: 2px; }
  .bib-notes { color: #6a5a3a; font-size: 0.76rem; margin-top: 2px; }
  .bib-item a { color: #4a7c5a; font-size: 0.76rem; }

  .loading { text-align: center; padding: 48px; color: #8a7a5a; font-size: 0.9rem; }
  .empty { text-align: center; padding: 48px; color: #8a7a5a; font-size: 0.9rem; }

  .section-empty { font-size: 0.82rem; color: #9a8a6a; font-style: italic; }

  .wiki-link {
    display: inline-flex; align-items: center; gap: 5px;
    background: #edf4f8; border: 1px solid #b0c8d8;
    color: #2a6090; padding: 4px 10px; border-radius: 4px;
    font-size: 0.78rem; text-decoration: none; margin-top: 8px;
  }
  .wiki-link:hover { background: #d8ecf8; }
</style>
</head>
<body>

<header>
  <h1>Nottingham Park Houses <span>The Park Conservation Trust — Historical Record</span></h1>
  <nav>
    <a href="/">🗺 Map</a>
    <a href="/people" class="active">👤 People</a>
    <a href="/architects">🏛 Architects</a>
    <a href="/census">📜 Census</a>
    <a href="/dashboard">📊 Dashboard</a>
  </nav>
</header>

<div class="toolbar">
  <h2>People of The Park</h2>
  <input type="text" id="searchBox" placeholder="Search by name…" oninput="applyFilters()">
  <button id="addPersonBtn" onclick="openAddPerson()" style="display:none;background:#4a7c5a;border:1px solid #3a6a4a;color:#e8dfc8;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:0.82rem;font-family:Georgia,serif">+ Add Person</button>
  <select id="occFilter" onchange="applyFilters()">
    <option value="">All occupations</option>
  </select>
  <select id="propFilter" onchange="applyFilters()">
    <option value="">All properties</option>
  </select>
  <span class="info" id="countInfo"></span>
</div>

<div class="main">
  <div id="loading" class="loading">Loading people…</div>
  <div id="grid" class="person-grid" style="display:none"></div>
  <div id="empty" class="empty" style="display:none">No people match your search.</div>
</div>

<!-- Person detail overlay -->
<div id="personOverlay" onclick="if(event.target===this)closeProfile()">
  <div id="personPane">
    <div class="pane-head" id="paneHead">
      <div class="pane-head-avatar" id="paneAvatar"></div>
      <div class="pane-head-text">
        <h2 id="paneName"></h2>
        <div class="pane-dates" id="paneDates"></div>
      </div>
      <button class="close-btn" onclick="closeProfile()">✕</button>
    </div>
    <div class="pane-body" id="paneBody"></div>
  </div>
</div>

<script>
let allPeople = [];
let currentPersonId = null;
let canUploadPhotos = false;
fetch('/api/me').then(r=>r.json()).then(d=>{ canUploadPhotos = !!(d.isAdmin || d.user); }).catch(()=>{});

// ── Utilities ────────────────────────────────────────────────────────────────
function initials(p) {
  const f = (p.first_name||'?')[0].toUpperCase();
  const l = (p.last_name||'')[0]?.toUpperCase() || '';
  return f + l;
}

async function uploadPersonPhoto(personId, input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const formData = new FormData();
  formData.append('photo', file);
  const label = input.parentElement;
  label.textContent = 'Uploading…';
  try {
    const res = await fetch(`/api/person/${personId}/photo`, { method: 'POST', body: formData });
    const data = await res.json();
    if (data.ok && data.url) {
      const avatar = document.getElementById('paneAvatar');
      avatar.innerHTML = `<img src="${data.url}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      label.textContent = '✓ Photo saved';
      setTimeout(() => { label.innerHTML = '📷 Change photo<input type="file" accept="image/*" style="display:none" onchange="uploadPersonPhoto('+personId+', this)">'; }, 2000);
    } else {
      label.textContent = '✗ Upload failed';
    }
  } catch(e) {
    label.textContent = '✗ Error: ' + e.message;
  }
}
function displayName(p) {
  let n = `${p.first_name || ''} ${p.last_name || ''}`.trim();
  if (p.known_as && p.known_as !== n) n = `${n}`;
  return n;
}
function yearOnly(val) {
  if (!val) return null;
  if (typeof val === 'number') return val;
  const m = String(val).match(/\b(1[0-9]{3}|20[0-2][0-9])\b/);
  return m ? parseInt(m[1]) : val;
}
function lifespan(p) {
  const b = yearOnly(p.born_year || p.born_date);
  const d = yearOnly(p.died_year || p.died_date);
  if (!b && !d) return '';
  return `${b || '?'} – ${d || '?'}`;
}
const servantOccupations = new Set(['domestic servant','general domestic servant','housemaid','kitchenmaid','nursemaid','cook','nurse','butler','footman','lady\'s maid','parlour maid','scullery maid','gardener','helper and gardener','valet']);
function isServant(occ) { return servantOccupations.has((occ||'').toLowerCase()); }

// ── Load people ──────────────────────────────────────────────────────────────
async function loadPeople() {
  try {
    const [peopleRes, occRes, propsRes] = await Promise.all([
      fetch('/api/people'),
      fetch('/api/occupations'),
      fetch('/api/all-props')
    ]);
    allPeople = await peopleRes.json();
    const occs = await occRes.json();
    const allProps = await propsRes.json().catch(() => []);

    // Build property name lookup
    const propNameLookup = {};
    allProps.forEach(p => {
      const addr = (p.address || p.name || '').replace(/:\s*([A-Z])/g, ', $1').replace(/:\s*$/, '').trim();
      propNameLookup[p.id] = addr || ('Property ' + p.id);
    });

    // Populate occupation filter
    const occSel = document.getElementById('occFilter');
    occs.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.occupation;
      opt.textContent = `${o.occupation.charAt(0).toUpperCase() + o.occupation.slice(1)} (${o.count})`;
      occSel.appendChild(opt);
    });

    // Populate property filter with real names
    const propSel = document.getElementById('propFilter');
    const propIds = [...new Set(allPeople.flatMap(p => p.property_ids || []).filter(Boolean))].sort((a,b)=>a-b);
    propIds.forEach(id => {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = propNameLookup[id] || `Property ${id}`;
      propSel.appendChild(opt);
    });

    // Store lookup globally for card display
    window._propNameLookup = propNameLookup;

    // Check URL for ?person=id
    const params = new URLSearchParams(location.search);
    if (params.get('person')) openProfile(parseInt(params.get('person')));

    renderGrid(allPeople);
  } catch(e) {
    document.getElementById('loading').textContent = 'Error loading people: ' + e.message;
  }
}

function applyFilters() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const occ = document.getElementById('occFilter').value.toLowerCase();
  const prop = parseInt(document.getElementById('propFilter').value) || null;
  let list = allPeople;
  if (q) list = list.filter(p => displayName(p).toLowerCase().includes(q) || (p.known_as||'').toLowerCase().includes(q));
  if (occ) list = list.filter(p => (p.occupations||[]).some(o => o.toLowerCase().includes(occ)));
  if (prop) list = list.filter(p => (p.property_ids||[]).includes(prop));
  renderGrid(list);
}

function renderGrid(list) {
  document.getElementById('loading').style.display = 'none';
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  document.getElementById('countInfo').textContent = `${list.length} ${list.length === 1 ? 'person' : 'people'}`;
  if (!list.length) { grid.style.display = 'none'; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.style.display = 'grid';
  grid.innerHTML = list.map(p => {
    const occs = (p.occupations || []).slice(0, 4);
    const propIds = p.property_ids || [];
    const wikiHtml = p.wikipedia_url ? `<a class="wiki-badge" href="${p.wikipedia_url}" target="_blank" onclick="event.stopPropagation()">Wikipedia ↗</a>` : '';
    const occHtml = occs.map(o => `<span class="occ-pill${isServant(o) ? ' servant' : ''}">${o}</span>`).join('');
    const avatar = p.photo_url
      ? `<img src="${p.photo_url}" alt="">`
      : initials(p);
    return `<div class="person-card" onclick="openProfile(${p.id})">
      ${wikiHtml}
      <div class="card-top">
        <div class="person-avatar">${avatar}</div>
        <div>
          <div class="card-name">${displayName(p)}</div>
          ${p.known_as ? `<div class="card-dates" style="font-style:italic">${p.known_as}</div>` : ''}
          <div class="card-dates">${lifespan(p)}</div>
        </div>
      </div>
      ${occs.length ? `<div class="occ-pills">${occHtml}</div>` : ''}
      ${(p.property_ids||[]).length ? `<div class="card-props">📍 ${(p.property_ids||[]).map(id=>(window._propNameLookup&&window._propNameLookup[id])||((p.property_names||[])[0])||'Property '+id).join(' · ')}</div>` : ''}
    </div>`;
  }).join('');
}

// ── Person profile ───────────────────────────────────────────────────────────
async function openProfile(id) {
  currentPersonId = id;
  document.getElementById('personOverlay').classList.add('visible');
  document.getElementById('paneBody').innerHTML = '<div class="loading">Loading…</div>';
  document.getElementById('paneName').textContent = '…';
  document.getElementById('paneDates').textContent = '';
  document.getElementById('paneAvatar').innerHTML = '';
  document.getElementById('personOverlay').scrollTop = 0;

  // Update URL
  const url = new URL(location.href);
  url.searchParams.set('person', id);
  history.pushState({}, '', url);

  try {
    const p = await fetch(`/api/person/${id}`).then(r => r.json());
    renderProfile(p);
  } catch(e) {
    document.getElementById('paneBody').innerHTML = `<div class="loading">Error: ${e.message}</div>`;
  }
}

function closeProfile() {
  document.getElementById('personOverlay').classList.remove('visible');
  currentPersonId = null;
  const url = new URL(location.href);
  url.searchParams.delete('person');
  history.pushState({}, '', url);
}

function renderProfile(p) {
  // Header
  document.getElementById('paneName').textContent = p.known_as || displayName(p);
  if (p.known_as && p.known_as !== displayName(p)) {
    document.getElementById('paneName').textContent = displayName(p);
    // subtitle handled below
  }
  const dates = [];
  const bornYr = parseInt(p.born_year) || parseInt((p.born_date||'').match(/\d{4}/)?.[0]);
  const diedYr = parseInt(p.died_year) || parseInt((p.died_date||'').match(/\d{4}/)?.[0]);
  const ageAtDeath = (bornYr && diedYr && diedYr > bornYr) ? (diedYr - bornYr) : null;
  if (p.born_date || p.born_year) dates.push(`b. ${p.born_date || p.born_year}${p.born_place ? ', '+p.born_place : ''}`);
  if (p.died_date || p.died_year) dates.push(`d. ${p.died_date || p.died_year}${p.died_place ? ', '+p.died_place : ''}${ageAtDeath ? ` (aged ${ageAtDeath})` : ''}`);
  document.getElementById('paneDates').textContent = dates.join('  ·  ');

  const avatar = document.getElementById('paneAvatar');
  if (p.photo_url) {
    avatar.innerHTML = `<img src="${p.photo_url}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  } else {
    avatar.textContent = initials(p);
  }

  // Photo upload button — shown to logged-in users
  const photoUploadHtml = canUploadPhotos ? `
    <div style="margin-top:6px;text-align:center;">
      <label style="cursor:pointer;font-size:0.72rem;color:#8a9a7a;text-decoration:underline;" title="Upload photo">
        📷 ${p.photo_url ? 'Change photo' : 'Add photo'}
        <input type="file" accept="image/*" style="display:none" onchange="uploadPersonPhoto(${p.id}, this)">
      </label>
    </div>` : '';
  const avatarWrap = avatar.parentElement;
  let existingUpload = avatarWrap.querySelector('.photo-upload-btn');
  if (existingUpload) existingUpload.remove();
  const uploadDiv = document.createElement('div');
  uploadDiv.className = 'photo-upload-btn';
  uploadDiv.innerHTML = photoUploadHtml;
  avatarWrap.appendChild(uploadDiv);

  // Body
  const html = [];

  // Known as / title
  if (p.known_as) {
    html.push(`<div class="pane-section">
      <div class="detail-grid">
        <span class="lbl">Also known as</span><span class="val">${p.known_as}</span>
        ${p.born_place ? `<span class="lbl">Born</span><span class="val">${p.born_date||p.born_year||''}${p.born_place ? ' — '+p.born_place : ''}</span>` : ''}
      </div>
    </div>`);
  }

  if (p.wikipedia_url) {
    html.push(`<div style="margin-bottom:16px"><a class="wiki-link" href="${p.wikipedia_url}" target="_blank">📖 Wikipedia article ↗</a></div>`);
  }

  // Grave
  if (p.grave_location || p.grave_number) {
    html.push(`<div class="pane-section">
      <h3>Burial</h3>
      <div class="detail-grid">
        ${p.grave_location ? `<span class="lbl">Location</span><span class="val">${p.grave_location}</span>` : ''}
        ${p.grave_number ? `<span class="lbl">Grave ref.</span><span class="val">${p.grave_number}</span>` : ''}
      </div>
    </div>`);
  }

  // Bio
  if (p.bio) {
    const paras = p.bio.split(/\n\n+|\n/).filter(t => t.trim()).map(t => `<p>${t.trim()}</p>`).join('');
    html.push(`<div class="pane-section">
      <h3>Story</h3>
      <div class="bio-text">${paras}</div>
    </div>`);
  }

  // Occupations
  html.push(`<div class="pane-section">
    <h3>Occupations &amp; Roles</h3>
    ${(p.occupations||[]).length ? `<div class="occ-timeline">${p.occupations.map(o => `
      <div class="occ-item">
        <div class="occ-years">${o.from_year||''}${o.from_year && o.to_year ? '–' : ''}${o.to_year&&o.to_year!==o.from_year ? o.to_year : ''}</div>
        <div>
          <div class="occ-title">${o.occupation}</div>
          ${o.employer ? `<div class="occ-employer">${o.employer}</div>` : ''}
          ${o.notes ? `<div class="occ-notes">${o.notes}</div>` : ''}
        </div>
      </div>`).join('')}</div>` : `<p class="section-empty">No occupation records.</p>`}
  </div>`);

  // Properties lived at
  const propIds = [...new Set((p.census_entries||[]).map(ce => ce.property_id).filter(Boolean))];
  if (propIds.length) {
    const propCards = propIds.map(pid => {
      const name = (window._propNameLookup && window._propNameLookup[pid]) || (p.census_entries.find(ce=>ce.property_id===pid)||{}).property_name || 'Property '+pid;
      const years = (p.census_entries||[]).filter(ce=>ce.property_id===pid).map(ce=>ce.census_year).filter(Boolean).sort();
      const yearStr = years.length ? years.join(', ') : '';
      return `<a href="/?id=${pid}" style="display:flex;align-items:center;gap:8px;background:#f5f0e8;border:1px solid #d8c8a0;border-radius:7px;padding:8px 12px;text-decoration:none;transition:background 0.15s" onmouseover="this.style.background='#ede5d0'" onmouseout="this.style.background='#f5f0e8'">
        <span style="font-size:1.1rem">🏛️</span>
        <div><div style="font-size:0.85rem;color:#1a3a2a;font-weight:600">${name}</div>${yearStr?`<div style="font-size:0.72rem;color:#8a7a5a">Census: ${yearStr}</div>`:''}</div>
        <span style="margin-left:auto;font-size:0.75rem;color:#4a7c5a">View on map ↗</span>
      </a>`;
    }).join('');
    html.push(`<div class="pane-section"><h3>Properties on The Park</h3><div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">${propCards}</div></div>`);
  }

  // Census entries
  if ((p.census_entries||[]).length) {
    const byYear = {};
    p.census_entries.forEach(ce => {
      if (!byYear[ce.census_year]) byYear[ce.census_year] = [];
      byYear[ce.census_year].push(ce);
    });
    const rows = Object.entries(byYear).sort(([a],[b])=>a-b).map(([yr,entries]) => `
      <div class="census-group">
        <div class="census-year-badge">${yr}</div>
        ${entries.map(ce => `<div class="census-row">
          <span class="census-role">${ce.relationship||'—'}</span>
          <span class="census-occ">${ce.occupation_at_census||'—'}${ce.age_at_census ? ` (aged ${ce.age_at_census})` : ''}</span>
          ${ce.property_id ? `<a class="census-prop" href="/?id=${ce.property_id}" title="Open on map">${ce.property_name || 'Property ' + ce.property_id} ↗</a>` : ce.address ? `<span class="census-prop" style="cursor:default;background:#e8e0f0;color:#2a1a4a" title="Address outside The Park">${ce.address}</span>` : ''}
        </div>`).join('')}
      </div>`).join('');
    html.push(`<div class="pane-section"><h3>Census Records</h3>${rows}</div>`);
  }

  // Related people
  // Deduplicate related people by person id (both directions may be present)
  const seenRelIds = new Set();
  const uniqueRels = (p.relationships||[]).filter(r => {
    const otherId = parseInt(p.id) === parseInt(r.person_a_id) ? r.person_b_id : r.person_a_id;
    if (seenRelIds.has(otherId)) return false;
    seenRelIds.add(otherId);
    return true;
  });
  if (uniqueRels.length) {
    const chips = uniqueRels.map(rel => {
      const other = rel.person_a_id === p.id
        ? { id: rel.bid, first: rel.b_first, last: rel.b_last, known: rel.b_known }
        : { id: rel.pid, first: rel.a_first, last: rel.a_last, known: rel.a_known };
      const relLabel = humaniseRelType(rel.relationship, rel.person_a_id === p.id);
      const otherName = `${other.first||''} ${other.last||''}`.trim();
      return `<div class="rel-chip" onclick="openProfile(${other.id})">
        <div class="rel-avatar">${(other.first||'?')[0].toUpperCase()}</div>
        <div>
          <div class="rel-name">${otherName}</div>
          <div class="rel-type">${relLabel}</div>
        </div>
      </div>`;
    }).join('');
    html.push(`<div class="pane-section"><h3>Related People</h3><div class="rel-list">${chips}</div></div>`);
  }

  // Significant places
  if ((p.places||[]).length) {
    const placeHtml = p.places.map(pl => `
      <div class="place-item">
        <h4>${pl.name}</h4>
        ${pl.connection ? `<div class="place-conn">${pl.connection}</div>` : ''}
        ${pl.location ? `<div class="place-loc">📍 ${pl.location}</div>` : ''}
        ${pl.description ? `<div style="font-size:0.8rem;color:#4a4a4a;margin-top:6px;line-height:1.6">${pl.description}</div>` : ''}
        ${pl.wikipedia_url ? `<a href="${pl.wikipedia_url}" target="_blank">Wikipedia ↗</a>` : ''}
      </div>`).join('');
    html.push(`<div class="pane-section"><h3>Significant Places</h3>${placeHtml}</div>`);
  }

  // Bibliography
  if ((p.bibliography||[]).length) {
    const bibHtml = p.bibliography.map(b => `
      <div class="bib-item">
        <div class="bib-title">${b.title}</div>
        <div class="bib-year">${[b.year, b.publisher].filter(Boolean).join(' · ')}</div>
        ${b.notes ? `<div class="bib-notes">${b.notes}</div>` : ''}
        ${b.url ? `<a href="${b.url}" target="_blank">View online ↗</a>` : ''}
      </div>`).join('');
    html.push(`<div class="pane-section"><h3>Bibliography</h3>${bibHtml}</div>`);
  }

  // Links section (loaded async)
  html.push(`<div class="pane-section" id="linksSection">
    <h3>External Links</h3>
    <div id="linksList"><div style="color:#8a7a5a;font-size:0.8rem">Loading...</div></div>
    ${canUploadPhotos ? `<div style="margin-top:8px">
      <button onclick="showAddLink(${p.id})" style="background:#f0ead8;border:1px solid #c8b87a;border-radius:6px;padding:5px 12px;font-size:0.8rem;color:#4a3a1a;cursor:pointer">+ Add link</button>
    </div>` : ''}
  </div>`);

  // Edit buttons for bio and dates (shown to logged-in users)
  if (canUploadPhotos) {
    html.push(`<div class="pane-section" style="border:1px solid #e8d8a0;border-radius:6px;padding:12px;background:#fdf9f0">
      <h3>Edit Record</h3>
      ${(()=>{
        const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
        function parseDateParts(val) {
          if (!val) return {d:'',m:'',y:''};
          const m = String(val).match(/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/);
          if (m) { const mi = MONTHS.findIndex(mo=>mo.toLowerCase()===m[2].toLowerCase()); return {d:m[1],m:mi>0?mi:'',y:m[3]}; }
          const m2 = String(val).match(/^([A-Za-z]+)\s+(\d{4})$/);
          if (m2) { const mi = MONTHS.findIndex(mo=>mo.toLowerCase()===m2[1].toLowerCase()); return {d:'',m:mi>0?mi:'',y:m2[2]}; }
          return {d:'',m:'',y:String(val).match(/\d{4}/)?.[0]||''};
        }
        const monthOpts = MONTHS.map((mo,i)=>i===0?`<option value="">Month</option>`:`<option value="${i}">${mo}</option>`).join('');
        const dayOpts = Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('');
        function dateRow(label, id, val) {
          const {d,m,y} = parseDateParts(val);
          const dSel = `<select id="${id}_day" data-val="${d}" style="padding:5px 4px;border:1px solid #d0c090;border-radius:4px;font-size:0.8rem"><option value="">Day</option>${dayOpts}</select>`;
          const mSel = `<select id="${id}_month" data-val="${m}" style="padding:5px 4px;border:1px solid #d0c090;border-radius:4px;font-size:0.8rem">${monthOpts}</select>`;
          const yIn  = `<input id="${id}_year" type="text" value="${y}" placeholder="Year" style="width:62px;padding:5px 6px;border:1px solid #d0c090;border-radius:4px;font-size:0.8rem">`;
          return `<div style="margin-bottom:8px"><label style="font-size:0.75rem;color:#8a7a5a">${label}</label><br>
            <div style="display:flex;gap:4px;margin-top:3px">${dSel}${mSel}${yIn}</div></div>`;
        }
        return dateRow('Date of birth','edit_born',p.born_date||p.born_year||'') + dateRow('Date of death','edit_died',p.died_date||p.died_year||'');
      })()}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div><label style="font-size:0.75rem;color:#8a7a5a">Born place</label><br>
          <input id="edit_born_place" value="${(p.born_place||'').replace(/"/g,'&quot;')}" style="width:100%;padding:5px 8px;border:1px solid #d0c090;border-radius:4px;font-size:0.83rem"></div>
        <div><label style="font-size:0.75rem;color:#8a7a5a">Died place</label><br>
          <input id="edit_died_place" value="${(p.died_place||'').replace(/"/g,'&quot;')}" style="width:100%;padding:5px 8px;border:1px solid #d0c090;border-radius:4px;font-size:0.83rem"></div>
        <div><label style="font-size:0.75rem;color:#8a7a5a">Grave location</label><br>
          <input id="edit_grave_location" value="${(p.grave_location||'').replace(/"/g,'&quot;')}" placeholder="e.g. General Cemetery, Nottm" style="width:100%;padding:5px 8px;border:1px solid #d0c090;border-radius:4px;font-size:0.83rem"></div>
        <div><label style="font-size:0.75rem;color:#8a7a5a">Grave number</label><br>
          <input id="edit_grave_number" value="${(p.grave_number||'').replace(/"/g,'&quot;')}" placeholder="e.g. Section A, Plot 12" style="width:100%;padding:5px 8px;border:1px solid #d0c090;border-radius:4px;font-size:0.83rem"></div>
      </div>
      <div style="margin-bottom:8px"><label style="font-size:0.75rem;color:#8a7a5a">Biography</label><br>
        <textarea id="edit_bio" rows="8" placeholder="Use blank lines between paragraphs." style="width:100%;padding:6px 8px;border:1px solid #d0c090;border-radius:4px;font-size:0.83rem;font-family:Georgia,serif;line-height:1.5">${(p.bio||'').replace(/</g,'&lt;')}</textarea></div>
      <div style="margin-bottom:8px"><label style="font-size:0.75rem;color:#8a7a5a">Wikipedia / external URL</label><br>
        <input id="edit_wikipedia_url" value="${(p.wikipedia_url||'').replace(/"/g,'&quot;')}" style="width:100%;padding:5px 8px;border:1px solid #d0c090;border-radius:4px;font-size:0.83rem"></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="savePerson(${p.id})" style="background:#1a3a2a;color:#e8dfc8;border:none;border-radius:5px;padding:7px 16px;cursor:pointer;font-size:0.83rem">Save changes</button>
        <button onclick="showAddRelationship(${p.id})" style="background:#f0ead8;border:1px solid #c8b87a;border-radius:5px;padding:7px 16px;cursor:pointer;font-size:0.83rem;color:#4a3a1a">+ Add relationship</button>
        <span id="saveStatus" style="font-size:0.78rem;color:#4a7c5a"></span>
      </div>
    </div>`);
  }

  // Media gallery placeholder — loaded async after render
  html.push(`<div class="pane-section" id="mediaGallery"><h3>Photos, Documents &amp; Videos</h3><div id="mediaItems" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:8px"><div style="color:#8a7a5a;font-size:0.8rem">Loading...</div></div>${canUploadPhotos?`<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
    <label style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;background:#f0ead8;border:1px solid #c8b87a;border-radius:6px;padding:6px 12px;font-size:0.8rem;color:#4a3a1a"><input type="file" accept="image/*,.pdf,.doc,.docx" style="display:none" onchange="uploadMedia(${p.id},this)">📎 Add photo or document</label>
    <label id="personVideoLabel_${p.id}" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;background:#e8f0e8;border:1px solid #8ab87a;border-radius:6px;padding:6px 12px;font-size:0.8rem;color:#1a4a1a"><input type="file" accept="video/*,.mp4,.mov,.avi,.mkv,.webm" style="display:none" onchange="uploadPersonVideo(${p.id},this)">🎥 Add video</label>
    <span id="personVideoStatus_${p.id}" style="font-size:0.78rem;color:#6a5a3a;align-self:center"></span>
  </div>`:''}</div>`);

  document.getElementById('paneBody').innerHTML = html.join('');

  // Initialise date selects from data-val (can't set value before insertion)
  ['edit_born_day','edit_born_month','edit_died_day','edit_died_month'].forEach(id => {
    const el = document.getElementById(id);
    if (el && el.dataset.val) el.value = el.dataset.val;
  });

  // Load media gallery and links
  loadMediaGallery(p.id);
  loadPersonLinks(p.id);
}

async function loadPersonLinks(personId) {
  const list = document.getElementById('linksList');
  if (!list) return;
  try {
    const links = await fetch(`/api/person/${personId}/links`).then(r=>r.json());
    if (!links.length) { list.innerHTML = '<div style="color:#8a7a5a;font-size:0.8rem;font-style:italic">No links added yet.</div>'; return; }
    list.innerHTML = links.map(l => `
      <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0e8d0">
        <span style="font-size:1rem">${l.link_type==='audio'?'🔊':l.link_type==='document'?'📄':'🔗'}</span>
        <div style="flex:1">
          <a href="${l.url}" target="_blank" style="font-size:0.85rem;color:#1a4a2a;font-weight:600">${l.title}</a>
          ${l.notes?`<div style="font-size:0.73rem;color:#8a7a5a">${l.notes}</div>`:''}
        </div>
        ${canUploadPhotos?`<button onclick="deleteLink(${personId},${l.id})" style="background:none;border:none;cursor:pointer;color:#c04040;font-size:0.8rem">✕</button>`:''}
      </div>`).join('');
  } catch(e) { if(list) list.innerHTML = ''; }
}

async function showAddLink(personId) {
  const title = prompt('Link title (e.g. "IWM Sound Recording"):');
  if (!title) return;
  const url = prompt('URL:');
  if (!url) return;
  const typeInput = prompt('Type (website / audio / document):', 'website');
  const notes = prompt('Notes (optional):') || '';
  const res = await fetch(`/api/person/${personId}/links`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ title, url, link_type: typeInput||'website', notes })
  }).then(r=>r.json());
  if (res.ok) loadPersonLinks(personId);
  else alert('Error: ' + (res.error||'unknown'));
}

async function deleteLink(personId, linkId) {
  if (!confirm('Remove this link?')) return;
  await fetch(`/api/person/${personId}/links/${linkId}`, { method:'DELETE' });
  loadPersonLinks(personId);
}

function extractYear(str) {
  if (!str) return null;
  const m = String(str).match(/\b(1[0-9]{3}|20[0-2][0-9])\b/);
  return m ? parseInt(m[1]) : null;
}

function buildDateString(prefix) {
  const MONTHS = ['','January','February','March','April','May','June','July','August','September','October','November','December'];
  const d = document.getElementById(prefix+'_day')?.value || '';
  const m = parseInt(document.getElementById(prefix+'_month')?.value || '') || 0;
  const y = document.getElementById(prefix+'_year')?.value?.trim() || '';
  if (!y) return null;
  if (d && m) return `${d} ${MONTHS[m]} ${y}`;
  if (m) return `${MONTHS[m]} ${y}`;
  return y;
}

async function savePerson(personId) {
  const status = document.getElementById('saveStatus');
  status.textContent = 'Saving…';
  const bornDate = buildDateString('edit_born');
  const diedDate = buildDateString('edit_died');
  const fields = {
    born_date: bornDate,
    born_year: bornDate ? (bornDate.match(/\d{4}/)?.[0] ? parseInt(bornDate.match(/\d{4}/)[0]) : null) : null,
    born_place: document.getElementById('edit_born_place').value || null,
    died_date: diedDate,
    died_year: diedDate ? (diedDate.match(/\d{4}/)?.[0] ? parseInt(diedDate.match(/\d{4}/)[0]) : null) : null,
    died_place: document.getElementById('edit_died_place').value || null,
    grave_location: document.getElementById('edit_grave_location').value || null,
    grave_number: document.getElementById('edit_grave_number').value || null,
    bio: document.getElementById('edit_bio').value || null,
    wikipedia_url: document.getElementById('edit_wikipedia_url').value || null,
  };
  // Remove null fields to avoid overwriting with null
  Object.keys(fields).forEach(k => { if (fields[k] === null) delete fields[k]; });
  try {
    const res = await fetch(`/api/person/${personId}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(fields)
    }).then(r=>r.json());
    if (res.ok) {
      status.textContent = '✓ Saved';
      status.style.color = '#2a7a2a';
      // Refresh the card in the grid
      const idx = allPeople.findIndex(p=>p.id===personId);
      if (idx>=0) { Object.assign(allPeople[idx], fields); renderGrid(allPeople); }
      setTimeout(()=>{ status.textContent=''; }, 3000);
    } else { status.textContent = '✗ ' + (res.error||'Error'); status.style.color='#c04040'; }
  } catch(e) { status.textContent = '✗ ' + e.message; status.style.color='#c04040'; }
}

async function showAddRelationship(personId) {
  const name = prompt('Person name to link to:');
  if (!name) return;
  // Search for the person
  const matches = allPeople.filter(p => (p.first_name+' '+p.last_name).toLowerCase().includes(name.toLowerCase()));
  if (!matches.length) { alert('Person not found — try their exact name'); return; }
  let chosen = matches[0];
  if (matches.length > 1) {
    const choice = prompt('Multiple matches:\n' + matches.map((m,i)=>`${i+1}. ${m.first_name} ${m.last_name} (${m.born_year||'?'})`).join('\n') + '\n\nEnter number:');
    chosen = matches[parseInt(choice)-1] || matches[0];
  }
  const relType = prompt(`Relationship type for ${chosen.first_name} ${chosen.last_name}:\n(e.g. spouse_of, parent_of, child_of, sibling_of)`, 'spouse_of');
  if (!relType) return;
  const res = await fetch(`/api/person/${personId}/relationship`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ other_person_id: chosen.id, relationship_type: relType })
  }).then(r=>r.json());
  if (res.ok) { alert(`Linked to ${chosen.first_name} ${chosen.last_name}`); openProfile(personId); }
  else alert('Error: ' + (res.error||'unknown'));
}

async function loadMediaGallery(personId) {
  try {
    const media = await fetch(`/api/person/${personId}/media`).then(r=>r.json());
    const container = document.getElementById('mediaItems');
    if (!container) return;
    if (!media.length) {
      container.innerHTML = '<div style="color:#8a7a5a;font-size:0.8rem;font-style:italic">No photos or documents yet.</div>';
      return;
    }
    container.innerHTML = media.map(m => {
      if (m.media_type === 'document') {
        return `<div style="width:100%;background:#f0ead8;border:1px solid #d8c8a0;border-radius:6px;padding:8px 12px;display:flex;align-items:center;gap:8px">
          <span style="font-size:1.3rem">📄</span>
          <div><a href="${m.url}" target="_blank" style="font-size:0.82rem;color:#2a4a2a;font-weight:600">${m.filename||'Document'}</a>${m.caption?`<div style="font-size:0.72rem;color:#8a7a5a">${m.caption}</div>`:''}</div>
          ${canUploadPhotos?`<button onclick="deleteMedia(${personId},${m.id})" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#c04040;font-size:0.8rem">✕</button>`:''}
        </div>`;
      } else if (m.media_type === 'video') {
        return `<div style="width:100%">
          <video controls style="width:100%;border-radius:6px;max-height:260px;background:#1a1a1a"><source src="${m.url}">Your browser does not support video.</video>
          ${m.caption?`<div style="font-size:0.72rem;color:#8a7a5a;margin-top:3px">${m.caption}</div>`:''}
          ${canUploadPhotos?`<button onclick="deleteMedia(${personId},${m.id})" style="margin-top:4px;background:none;border:1px solid #d8c8a0;border-radius:4px;cursor:pointer;color:#c04040;font-size:0.75rem;padding:2px 8px">Remove</button>`:''}
        </div>`;
      } else {
        return `<div style="position:relative">
          <img src="${m.url}" alt="${m.caption||''}" style="width:120px;height:90px;object-fit:cover;border-radius:6px;border:1px solid #d8c8a0;cursor:pointer" onclick="window.open('${m.url}','_blank')" title="${m.caption||''}">
          ${m.caption?`<div style="font-size:0.68rem;color:#8a7a5a;text-align:center;max-width:120px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${m.caption}</div>`:''}
          ${canUploadPhotos?`<button onclick="deleteMedia(${personId},${m.id})" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.5);border:none;cursor:pointer;color:white;font-size:0.7rem;border-radius:3px;padding:1px 4px">✕</button>`:''}
        </div>`;
      }
    }).join('');
  } catch(e) {}
}

async function uploadMedia(personId, input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const caption = prompt('Add a caption (optional):') || '';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('caption', caption);
  const label = input.parentElement;
  const orig = label.innerHTML;
  label.textContent = 'Uploading…';
  try {
    const res = await fetch(`/api/person/${personId}/media`, { method:'POST', body:fd });
    const data = await res.json();
    if (data.ok) { label.innerHTML = orig; loadMediaGallery(personId); }
    else { label.textContent = '✗ ' + (data.error||'Failed'); setTimeout(()=>{label.innerHTML=orig;},2000); }
  } catch(e) { label.innerHTML = orig; }
}

async function uploadPersonVideo(personId, input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const status = document.getElementById('personVideoStatus_' + personId);
  const label = document.getElementById('personVideoLabel_' + personId);
  const caption = prompt('Add a caption (optional):') || '';
  if (status) { status.textContent = `Uploading ${file.name} (${(file.size/1024/1024).toFixed(1)} MB)…`; status.style.color='#6a5a3a'; }
  if (label) label.style.opacity = '0.6';
  input.value = '';
  try {
    const res = await fetch(`/api/person/${personId}/media/video`, {
      method: 'POST',
      headers: { 'x-filename': file.name, 'x-caption': caption },
      body: file,
    });
    const data = await res.json();
    if (data.ok) {
      if (status) { status.textContent = '✓ Uploaded'; status.style.color='#2a6a2a'; }
      loadMediaGallery(personId);
      setTimeout(() => { if (status) status.textContent = ''; }, 3000);
    } else {
      if (status) { status.textContent = '✗ ' + (data.error||'Failed'); status.style.color='#c04040'; }
    }
  } catch(e) {
    if (status) { status.textContent = '✗ ' + e.message; status.style.color='#c04040'; }
  }
  if (label) label.style.opacity = '1';
}

async function deleteMedia(personId, mediaId) {
  if (!confirm('Remove this item?')) return;
  await fetch(`/api/person/${personId}/media/${mediaId}`, { method:'DELETE' });
  loadMediaGallery(personId);
}

function humaniseRelType(type, isA) {
  const map = {
    'spouse_of': 'Spouse',
    // parent_of: A is parent of B → when viewing A (isA=true), B is A's Child; when viewing B (isA=false), A is B's Parent
    'parent_of': isA ? 'Child' : 'Parent',
    'child_of': isA ? 'Parent' : 'Child',
    'sibling_of': 'Sibling',
    'employer_of': isA ? 'Employer' : 'Employee',
    'employee_of': isA ? 'Employee' : 'Employer',
    'sibling_of': 'Sibling',
  };
  return map[type] || type;
}

// keyboard
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeProfile(); });

loadPeople();

// Show Add Person button if logged in
fetch('/api/me').then(r=>r.json()).then(me=>{
  if(me.isAdmin||(me.user&&(me.user.role==='contributor'||me.user.role==='admin'))) document.getElementById('addPersonBtn').style.display='';
}).catch(()=>{});

function openAddPerson() {
  document.getElementById('addPersonOverlay').style.display='flex';
  document.getElementById('ap_first_name').focus();
}
function closeAddPerson() {
  document.getElementById('addPersonOverlay').style.display='none';
  document.getElementById('addPersonForm').reset();
  document.getElementById('apError').textContent='';
}

async function submitAddPerson() {
  const get = id => document.getElementById(id).value.trim();
  const first_name = get('ap_first_name');
  const last_name = get('ap_last_name');
  if (!first_name || !last_name) { document.getElementById('apError').textContent='First and last name are required.'; return; }
  const bornDate = buildDateString('ap_born');
  const diedDate = buildDateString('ap_died');
  const body = {
    first_name, last_name,
    known_as: get('ap_known_as') || null,
    born_date: bornDate,
    born_year: bornDate ? (parseInt(bornDate.match(/\d{4}/)?.[0]) || null) : null,
    born_place: get('ap_born_place') || null,
    died_date: diedDate,
    died_year: diedDate ? (parseInt(diedDate.match(/\d{4}/)?.[0]) || null) : null,
    died_place: get('ap_died_place') || null,
    bio: get('ap_bio') || null,
    wikipedia_url: get('ap_wikipedia_url') || null,
  };
  const btn = document.getElementById('apSubmitBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  try {
    const res = await fetch('/api/person', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) }).then(r=>r.json());
    if (res.ok) {
      closeAddPerson();
      // Add to list and open profile
      const newPerson = { id: res.id, ...body, occupations: [], property_ids: [], census_years: [] };
      allPeople.unshift(newPerson);
      renderGrid(allPeople);
      openProfile(res.id);
    } else {
      document.getElementById('apError').textContent = res.error || 'Failed to save.';
    }
  } catch(e) {
    document.getElementById('apError').textContent = e.message;
  }
  btn.textContent = 'Save Person'; btn.disabled = false;
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeAddPerson(); });
</script>

          </select>

          </select>
