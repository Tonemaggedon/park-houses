<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Trees — Nottingham Park Houses</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',Arial,sans-serif; background:#0f1923; color:#e8e0d0; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.header { background:linear-gradient(135deg,#1a2a1a 0%,#0f1923 50%,#1a1a2e 100%); border-bottom:1px solid #2a3a2a; padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:60px; flex-shrink:0; }
.header-title { font-size:1.1rem; font-weight:700; color:#c8b87a; letter-spacing:0.05em; }
.header-sub { font-size:0.75rem; color:#8a9a7a; }
.nav-links { display:flex; gap:0.5rem; }
.nav-links a { color:#8a9a7a; text-decoration:none; font-size:0.85rem; padding:0.3rem 0.8rem; border-radius:4px; transition:all 0.2s; }
.nav-links a:hover,.nav-links a.active { color:#c8b87a; background:rgba(200,184,122,0.1); }
.layout { display:flex; flex:1; overflow:hidden; }
.sidebar { width:250px; background:#141e14; border-right:1px solid #2a3a2a; display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-header { padding:0.8rem; border-bottom:1px solid #2a3a2a; }
.sidebar-title { color:#c8b87a; font-size:0.88rem; font-weight:600; margin-bottom:0.5rem; }
.search-box { width:100%; background:#0f1923; border:1px solid #2a3a2a; border-radius:6px; color:#e8e0d0; padding:0.45rem 0.7rem; font-size:0.8rem; outline:none; }
.search-box:focus { border-color:#c8b87a; }
.people-list { flex:1; overflow-y:auto; }
.person-item { padding:0.6rem 0.9rem; border-bottom:1px solid #1a2a1a; cursor:pointer; transition:background 0.15s; }
.person-item:hover { background:#1e2d1e; }
.person-item.active { background:#253525; border-left:3px solid #c8b87a; padding-left:calc(0.9rem - 3px); }
.person-name { font-size:0.82rem; color:#e8e0d0; font-weight:500; }
.person-dates { font-size:0.7rem; color:#5a7a5a; }
.tree-area { flex:1; position:relative; overflow:hidden; background:#0f1923; }
.no-sel { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.8rem; color:#3a4a3a; pointer-events:none; }
.no-sel .icon { font-size:3rem; opacity:0.2; }
.no-sel p { font-size:0.85rem; }
.zoom-controls { position:absolute; bottom:1rem; right:1rem; display:flex; flex-direction:column; gap:0.3rem; z-index:10; }
.zoom-btn { background:#1e2d1e; border:1px solid #2a3a2a; color:#8a9a7a; width:30px; height:30px; border-radius:5px; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; }
.zoom-btn:hover { border-color:#c8b87a; color:#c8b87a; }
.legend { position:absolute; bottom:1rem; left:50%; transform:translateX(-50%); background:rgba(14,22,14,0.92); border:1px solid #2a3a2a; border-radius:7px; padding:0.5rem 1rem; display:flex; gap:1.2rem; font-size:0.7rem; z-index:10; }
.leg { display:flex; align-items:center; gap:0.4rem; color:#8a9a7a; }
.leg-line { width:20px; height:2px; }
/* Household panel */
.household-panel { position:absolute; right:0; top:0; bottom:0; width:210px; background:#141e14cc; backdrop-filter:blur(4px); border-left:1px solid #2a3a2a; display:flex; flex-direction:column; transform:translateX(100%); transition:transform 0.3s; z-index:5; }
.household-panel.show { transform:translateX(0); }
.hp-hdr { padding:0.8rem; border-bottom:1px solid #2a3a2a; }
.hp-hdr h3 { font-size:0.82rem; color:#c8b87a; }
.hp-hdr p { font-size:0.68rem; color:#5a7a5a; margin-top:2px; }
.hp-list { flex:1; overflow-y:auto; padding:0.5rem; }
.hp-card { background:#1e2d1e; border:1px solid #2a3a2a; border-radius:7px; padding:0.55rem 0.7rem; margin-bottom:0.4rem; cursor:pointer; transition:border-color 0.15s; }
.hp-card:hover { border-color:#5b9bd5; }
.hp-name { font-size:0.78rem; color:#e8e0d0; font-weight:500; }
.hp-role { font-size:0.66rem; color:#5b9bd5; margin-top:1px; }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:#0f1923; } ::-webkit-scrollbar-thumb { background:#2a4a2a; border-radius:2px; }
</style>
</head>
<body>
<div class="header">
  <div><div class="header-title">THE PARK CONSERVATION TRUST</div><div class="header-sub">Family Trees &amp; Bloodlines</div></div>
  <nav class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/">Map</a>
    <a href="/people">People</a>
    <a href="/family-tree" class="active">Family Trees</a>
  </nav>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">🌳 Select a Person</div>
      <input class="search-box" id="personSearch" placeholder="Search by name..." oninput="filterPeople(this.value)">
    </div>
    <div class="people-list" id="peopleList"><div style="padding:1rem;color:#5a7a5a;font-size:0.8rem;text-align:center">Loading...</div></div>
  </div>
  <div class="tree-area" id="treeArea">
    <svg id="treeSvg" style="width:100%;height:100%;"></svg>
    <div class="no-sel" id="noSel"><div class="icon">🌳</div><p>Select a person to view their family tree</p></div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoomBy(1.3)">+</button>
      <button class="zoom-btn" onclick="zoomBy(0.77)">−</button>
      <button class="zoom-btn" onclick="resetZoom()">⟳</button>
    </div>
    <div class="legend">
      <div class="leg"><div style="width:12px;height:12px;border-radius:2px;background:#c8b87a;opacity:0.8"></div> Selected</div>
      <div class="leg"><div style="width:12px;height:12px;border-radius:2px;background:#2d4a3a;border:1px solid #4caf82"></div> Family</div>
      <div class="leg"><div class="leg-line" style="background:#c8b87a"></div> Parent / Child</div>
      <div class="leg"><div class="leg-line" style="background:#e07b39;border-top:2px dashed #e07b39;height:0;background:none"></div> Spouse</div>
    </div>
  </div>
  <div class="household-panel" id="householdPanel">
    <div class="hp-hdr"><h3>🏠 Household</h3><p>Same address — not blood relatives</p></div>
    <div class="hp-list" id="householdList"></div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────────
const CARD_W = 190, CARD_H = 72, CARD_R = 8;
const H_GAP = 60, V_GAP = 100;
const PHOTO_R = 24;

// Colour palette
const C = { gold:'#c8b87a', green:'#4caf82', orange:'#e07b39', blue:'#5b9bd5', bg:'#0f1923', cardBg:'#1a2a1a', cardBorder:'#2a3a2a', text:'#e8e0d0', sub:'#8a9a7a' };

let allPeople = [], svg, g, zoomBeh, currentId = null;

function isSpouseRel(t) { return /spouse|wife|husband|partner|married/i.test(t||''); }
function isParentRel(t) { return /parent|father|mother|grandfather|grandmother|grandparent/i.test(t||''); }
function isChildRel(t)  { return /child|son|daughter|grandson|granddaughter|grandchild/i.test(t||''); }
function isSiblingRel(t){ return /sibling|brother|sister/i.test(t||''); }

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const data = await fetch('/api/people').then(r=>r.json());
    if (!data||!data.length) { showNoDB(); return; }
    allPeople = data;
    renderList(allPeople);
  } catch(e) { showNoDB(); }
}

function showNoDB() {
  document.getElementById('noSel').innerHTML = `<div class="icon">🔌</div><p style="color:#8a9a7a">Database not connected.<br>Deploy to Railway to enable.</p><a href="/dashboard" style="color:#c8b87a;font-size:0.8rem;margin-top:0.5rem">← Dashboard</a>`;
  document.getElementById('peopleList').innerHTML = '<div style="padding:1rem;color:#5a7a5a;font-size:0.8rem;text-align:center">No database</div>';
}

function renderList(people) {
  document.getElementById('peopleList').innerHTML = people.length
    ? people.map(p=>`<div class="person-item" id="pi-${p.id}" onclick="loadTree(${p.id})"><div class="person-name">${nameOf(p)}</div><div class="person-dates">${dateStr(p)}</div></div>`).join('')
    : '<div style="padding:1rem;color:#5a7a5a;font-size:0.8rem">No results</div>';
}

function filterPeople(q) {
  renderList(q ? allPeople.filter(p=>nameOf(p).toLowerCase().includes(q.toLowerCase())) : allPeople);
}

// ── Load & draw tree ──────────────────────────────────────────────────────────
async function loadTree(id) {
  currentId = id;
  document.querySelectorAll('.person-item').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('pi-'+id);
  if(el){ el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('noSel').style.display='none';

  const person = await fetch('/api/person/'+id).then(r=>r.json()).catch(()=>null);
  if(!person||person.error) return;

  const rels = person.relationships||[];

  // Classify related people
  const nodes = [];
  const links = [];
  const pid = parseInt(id);

  // Centre node
  nodes.push({ id:pid, person, level:0, slot:0, type:'center' });

  rels.forEach(rel => {
    const isA = parseInt(rel.person_a_id)===pid;
    const otherId = parseInt(isA ? rel.person_b_id : rel.person_a_id);
    const otherName = isA ? [rel.b_known||rel.b_first, rel.b_last] : [rel.a_known||rel.a_first, rel.a_last];
    const relType = rel.relationship_type||'';

    if(nodes.find(n=>n.id===otherId)) return;

    let level=0, linkType='family';
    if(isSpouseRel(relType))         { level=0;  linkType='spouse'; }
    else if(isParentRel(relType))    { level=-1; linkType='parent'; }
    else if(isChildRel(relType))     { level=1;  linkType='child'; }
    else if(isSiblingRel(relType))   { level=0;  linkType='sibling'; }
    else                             { level=0;  linkType='family'; }

    nodes.push({ id:otherId, name:otherName.filter(Boolean).join(' ')||'Unknown', level, type:linkType, rel:relType });
    links.push({ source:pid, target:otherId, type:linkType, label:relType });
  });

  // Assign x positions by level group
  const byLevel = {};
  nodes.forEach(n => { if(!byLevel[n.level]) byLevel[n.level]=[];  byLevel[n.level].push(n); });
  Object.entries(byLevel).forEach(([lv,grp]) => {
    grp.forEach((n,i) => { n.slot = i - (grp.length-1)/2; });
  });

  drawTree(nodes, links, person);

  // Household: same property, not in tree
  const propIds = [...new Set((person.census_entries||[]).map(c=>c.property_id).filter(Boolean))];
  const familyIds = new Set(nodes.map(n=>n.id));
  let household = [];
  if(propIds.length) {
    const all = await Promise.all(propIds.map(pid2=>fetch('/api/people-at-property/'+pid2).then(r=>r.json()).catch(()=>[])));
    all.forEach(arr=>(arr||[]).forEach(p=>{ if(!familyIds.has(parseInt(p.id))&&!household.find(h=>h.id===p.id)) household.push(p); }));
  }
  renderHousehold(household, person.census_entries||[]);
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawTree(nodes, links, centerPerson) {
  const area = document.getElementById('treeArea');
  const W = area.clientWidth, H = area.clientHeight;
  d3.select('#treeSvg').selectAll('*').remove();

  svg = d3.select('#treeSvg');
  zoomBeh = d3.zoom().scaleExtent([0.1,3]).on('zoom', e=>g.attr('transform',e.transform));
  svg.call(zoomBeh);
  g = svg.append('g');

  // Calculate node positions: level → Y, slot → X
  const levelY = lv => H/2 + lv * (CARD_H + V_GAP);
  const slotX  = (slot, lv) => {
    const count = nodes.filter(n=>n.level===lv).length;
    return W/2 + slot * (CARD_W + H_GAP);
  };
  nodes.forEach(n => {
    n.x = slotX(n.slot, n.level);
    n.y = levelY(n.level);
  });

  // ── Draw links ──────────────────────────────────────────────────────────────
  const linkMap = {};
  nodes.forEach(n=>linkMap[n.id]=n);

  links.forEach(lk => {
    const src = linkMap[lk.source], tgt = linkMap[lk.target];
    if(!src||!tgt) return;

    const sx = src.x + CARD_W/2, sy = src.y + CARD_H/2;
    const tx = tgt.x + CARD_W/2, ty = tgt.y + CARD_H/2;
    const isVert = src.level !== tgt.level;

    let pathD;
    if(isVert) {
      // Vertical elbow
      const midY = (sy + ty)/2;
      pathD = `M${sx},${sy} L${sx},${midY} L${tx},${midY} L${tx},${ty}`;
    } else {
      // Horizontal — short arc between them
      pathD = `M${Math.min(sx,tx)+Math.abs(tx-sx)/2-20},${sy} Q${(sx+tx)/2},${sy-30} ${Math.max(sx,tx)-Math.abs(tx-sx)/2+20},${ty}`;
      pathD = `M${sx},${sy} C${sx+40},${sy} ${tx-40},${ty} ${tx},${ty}`;
    }

    const isSpouse = lk.type==='spouse';
    g.append('path')
      .attr('d', pathD)
      .attr('fill','none')
      .attr('stroke', isSpouse ? C.orange : C.green)
      .attr('stroke-width', isSpouse ? 1.5 : 2)
      .attr('stroke-dasharray', isSpouse ? '6,4' : 'none')
      .attr('opacity', 0.7);

    // Relationship label at midpoint
    if(lk.label) {
      g.append('text')
        .attr('x',(sx+tx)/2).attr('y',(sy+ty)/2-8)
        .attr('text-anchor','middle')
        .attr('fill','#8a7a4a').attr('font-size','9px').attr('font-family','Segoe UI,sans-serif')
        .text(lk.label);
    }
  });

  // ── Draw person cards ───────────────────────────────────────────────────────
  nodes.forEach(node => {
    const isCenter = node.type==='center';
    const isSpouse = node.type==='spouse';
    const card = g.append('g').attr('cursor','pointer')
      .on('click', () => { if(!isCenter) loadTree(node.id); });

    // Card background
    const borderCol = isCenter ? C.gold : isSpouse ? C.orange : C.green;
    const bgCol = isCenter ? '#2a3a1a' : '#1a2a1a';

    // Drop shadow
    card.append('rect')
      .attr('x', node.x+3).attr('y', node.y+3)
      .attr('width',CARD_W).attr('height',CARD_H).attr('rx',CARD_R)
      .attr('fill','rgba(0,0,0,0.4)');

    // Main card
    card.append('rect')
      .attr('x', node.x).attr('y', node.y)
      .attr('width',CARD_W).attr('height',CARD_H).attr('rx',CARD_R)
      .attr('fill', bgCol)
      .attr('stroke', borderCol).attr('stroke-width', isCenter ? 2.5 : 1.5);

    // Photo circle
    const cx = node.x + PHOTO_R + 10;
    const cy = node.y + CARD_H/2;

    // Photo placeholder background
    card.append('circle').attr('cx',cx).attr('cy',cy).attr('r',PHOTO_R)
      .attr('fill', borderCol+'22').attr('stroke',borderCol).attr('stroke-width',1.5);

    // If person has a photo URL, show image
    const person = node.person;
    if(person && person.photo_url) {
      const clipId = 'clip-'+node.id;
      const defs = svg.select('defs').empty() ? svg.insert('defs','g') : svg.select('defs');
      defs.append('clipPath').attr('id',clipId)
        .append('circle').attr('cx',cx).attr('cy',cy).attr('r',PHOTO_R);
      card.append('image')
        .attr('href',person.photo_url)
        .attr('x',cx-PHOTO_R).attr('y',cy-PHOTO_R)
        .attr('width',PHOTO_R*2).attr('height',PHOTO_R*2)
        .attr('clip-path',`url(#${clipId})`);
    } else {
      // Initials
      const n = node.person ? nameOf(node.person) : (node.name||'?');
      card.append('text')
        .attr('x',cx).attr('y',cy).attr('dy','0.35em')
        .attr('text-anchor','middle')
        .attr('fill',borderCol).attr('font-size','14px').attr('font-weight','700')
        .attr('font-family','Segoe UI,sans-serif')
        .text(initials(n));
    }

    // Text area
    const tx = node.x + PHOTO_R*2 + 18;
    const name = node.person ? nameOf(node.person) : (node.name||'Unknown');
    const dates = node.person ? dateStr(node.person) : '';
    const occ = node.person ? topOcc(node.person) : '';
    const born = node.person ? (node.person.born_year?'★ '+node.person.born_year:'') : '';
    const died = node.person ? (node.person.died_year?'† '+node.person.died_year:'') : '';

    // Name (split into two lines if long)
    const nameParts = name.split(' ');
    const firstName = nameParts.slice(0,-1).join(' ');
    const lastName = nameParts.slice(-1)[0]||name;

    if(firstName && firstName !== lastName) {
      card.append('text').attr('x',tx).attr('y',node.y+20)
        .attr('fill',C.sub).attr('font-size','10px').attr('font-family','Segoe UI,sans-serif')
        .text(firstName);
      card.append('text').attr('x',tx).attr('y',node.y+34)
        .attr('fill',C.text).attr('font-size','13px').attr('font-weight','700').attr('font-family','Segoe UI,sans-serif')
        .text(lastName);
    } else {
      card.append('text').attr('x',tx).attr('y',node.y+30)
        .attr('fill',C.text).attr('font-size','13px').attr('font-weight','700').attr('font-family','Segoe UI,sans-serif')
        .text(name.length>20?name.substring(0,20)+'…':name);
    }

    // Dates row
    if(born||died) {
      const datesText = [born, died].filter(Boolean).join('  ');
      card.append('text').attr('x',tx).attr('y',node.y+50)
        .attr('fill','#8a9a7a').attr('font-size','10px').attr('font-family','Segoe UI,sans-serif')
        .text(datesText);
    }

    // Occupation (small italic)
    if(occ) {
      card.append('text').attr('x',tx).attr('y',node.y+64)
        .attr('fill',C.gold).attr('font-size','9px').attr('font-style','italic').attr('font-family','Segoe UI,sans-serif')
        .text(occ.length>24?occ.substring(0,24)+'…':occ);
    }
  });

  // Centre & fit
  const allX = nodes.map(n=>n.x), allY = nodes.map(n=>n.y);
  const minX=Math.min(...allX), maxX=Math.max(...allX)+CARD_W;
  const minY=Math.min(...allY), maxY=Math.max(...allY)+CARD_H;
  const treeW=maxX-minX, treeH=maxY-minY;
  const scale=Math.min(0.95, Math.min(W/Math.max(treeW+80,1), H/Math.max(treeH+80,1)));
  const tx2 = (W-treeW*scale)/2 - minX*scale;
  const ty2 = (H-treeH*scale)/2 - minY*scale;
  svg.call(zoomBeh.transform, d3.zoomIdentity.translate(tx2,ty2).scale(scale));
}

// ── Household panel ───────────────────────────────────────────────────────────
function renderHousehold(members, censusEntries) {
  const panel = document.getElementById('householdPanel');
  const list = document.getElementById('householdList');
  if(!members.length){ panel.classList.remove('show'); return; }
  panel.classList.add('show');
  list.innerHTML = members.map(m => {
    const entry = censusEntries.find(c=>parseInt(c.person_id)===parseInt(m.id));
    const role = entry ? (entry.household_role||'') : '';
    return `<div class="hp-card" onclick="loadTree(${m.id})"><div class="hp-name">${nameOf(m)}</div>${role?`<div class="hp-role">${role}</div>`:''}</div>`;
  }).join('');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function nameOf(p){ return [p.known_as||p.first_name, p.last_name].filter(Boolean).join(' ')||'Unknown'; }
function dateStr(p){ return (p.born_year||p.died_year)?`${p.born_year||'?'} – ${p.died_year||''}`:'';}
function topOcc(p){ return p.occupations&&p.occupations[0]?p.occupations[0].occupation:''; }
function initials(n){ return n.split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase(); }
function zoomBy(f){ svg.transition().duration(300).call(zoomBeh.scaleBy,f); }
function resetZoom(){ svg.transition().duration(500).call(zoomBeh.transform,d3.zoomIdentity); }

init();
</script>
</body>
</html>
