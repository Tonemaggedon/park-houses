<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Trees — Nottingham Park Houses</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',Arial,sans-serif; background:#0f1923; color:#e8e0d0; min-height:100vh; display:flex; flex-direction:column; }
.header { background:linear-gradient(135deg,#1a2a1a 0%,#0f1923 50%,#1a1a2e 100%); border-bottom:1px solid #2a3a2a; padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:60px; flex-shrink:0; }
.header-title { font-size:1.1rem; font-weight:700; color:#c8b87a; letter-spacing:0.05em; }
.header-sub { font-size:0.75rem; color:#8a9a7a; }
.nav-links { display:flex; gap:0.5rem; }
.nav-links a { color:#8a9a7a; text-decoration:none; font-size:0.85rem; padding:0.3rem 0.8rem; border-radius:4px; transition:all 0.2s; }
.nav-links a:hover,.nav-links a.active { color:#c8b87a; background:rgba(200,184,122,0.1); }
.layout { display:flex; flex:1; overflow:hidden; height:calc(100vh - 60px); }

/* Sidebar */
.sidebar { width:260px; background:#141e14; border-right:1px solid #2a3a2a; display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-header { padding:0.8rem; border-bottom:1px solid #2a3a2a; }
.sidebar-header h2 { color:#c8b87a; font-size:0.9rem; margin-bottom:0.5rem; }
.search-box { width:100%; background:#0f1923; border:1px solid #2a3a2a; border-radius:6px; color:#e8e0d0; padding:0.45rem 0.7rem; font-size:0.8rem; outline:none; }
.search-box:focus { border-color:#c8b87a; }
.people-list { flex:1; overflow-y:auto; }
.person-item { padding:0.6rem 0.9rem; border-bottom:1px solid #1a2a1a; cursor:pointer; transition:background 0.15s; }
.person-item:hover { background:#1e2d1e; }
.person-item.active { background:#253525; border-left:3px solid #c8b87a; padding-left:calc(0.9rem - 3px); }
.person-name { font-size:0.83rem; color:#e8e0d0; font-weight:500; }
.person-dates { font-size:0.7rem; color:#5a7a5a; margin-top:1px; }

/* Main tree area */
.tree-area { flex:1; position:relative; overflow:hidden; background:#0f1923; }
.tree-svg { width:100%; height:100%; }

/* Household panel - right side */
.household-panel { position:absolute; right:0; top:0; bottom:0; width:220px; background:#141e14; border-left:1px solid #2a3a2a; display:flex; flex-direction:column; transform:translateX(100%); transition:transform 0.3s; }
.household-panel.show { transform:translateX(0); }
.hp-header { padding:0.8rem; border-bottom:1px solid #2a3a2a; }
.hp-header h3 { font-size:0.85rem; color:#c8b87a; }
.hp-header p { font-size:0.7rem; color:#5a7a5a; margin-top:2px; }
.hp-list { flex:1; overflow-y:auto; padding:0.5rem; }
.hp-person { background:#1e2d1e; border:1px solid #2a3a2a; border-radius:7px; padding:0.6rem 0.7rem; margin-bottom:0.4rem; cursor:pointer; transition:all 0.15s; }
.hp-person:hover { border-color:#5b9bd5; }
.hp-name { font-size:0.8rem; color:#e8e0d0; font-weight:500; }
.hp-role { font-size:0.68rem; color:#5b9bd5; margin-top:2px; }
.hp-occ { font-size:0.68rem; color:#8a9a7a; }

/* Detail card */
.detail-card { position:absolute; left:1rem; bottom:1rem; width:240px; background:#141e14; border:1px solid #2a3a2a; border-radius:10px; padding:1rem; display:none; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
.detail-card.show { display:block; }
.dc-close { position:absolute; top:0.6rem; right:0.6rem; background:none; border:none; color:#5a7a5a; cursor:pointer; font-size:1rem; }
.dc-close:hover { color:#c8b87a; }
.dc-name { font-size:1rem; color:#c8b87a; font-weight:700; line-height:1.2; }
.dc-dates { font-size:0.75rem; color:#8a9a7a; margin-top:0.2rem; }
.dc-row { margin-top:0.6rem; }
.dc-label { font-size:0.65rem; text-transform:uppercase; color:#5a7a5a; letter-spacing:0.06em; }
.dc-value { font-size:0.8rem; color:#e8e0d0; margin-top:1px; }
.dc-links { display:flex; gap:0.5rem; margin-top:0.7rem; flex-wrap:wrap; }
.dc-link { font-size:0.72rem; color:#5b9bd5; text-decoration:none; }
.dc-link:hover { color:#c8b87a; }

/* No selection */
.no-sel { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.8rem; color:#3a4a3a; pointer-events:none; }
.no-sel .icon { font-size:3.5rem; opacity:0.25; }
.no-sel p { font-size:0.85rem; }

/* Zoom */
.zoom-controls { position:absolute; bottom:1rem; right:1rem; display:flex; flex-direction:column; gap:0.3rem; }
.zoom-btn { background:#1e2d1e; border:1px solid #2a3a2a; color:#8a9a7a; width:30px; height:30px; border-radius:5px; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; }
.zoom-btn:hover { border-color:#c8b87a; color:#c8b87a; }

/* Legend */
.legend { position:absolute; bottom:1rem; left:50%; transform:translateX(-50%); background:rgba(20,30,20,0.9); border:1px solid #2a3a2a; border-radius:7px; padding:0.5rem 0.9rem; display:flex; gap:1rem; font-size:0.7rem; }
.leg-item { display:flex; align-items:center; gap:0.4rem; color:#8a9a7a; }
.leg-line { width:24px; height:2px; }
.leg-dot { width:10px; height:10px; border-radius:50%; }

/* D3 */
.node { cursor:pointer; }
.node circle { stroke-width:2.5px; transition:r 0.2s; }
.node:hover circle { stroke-width:3.5px; }
.node text { font-family:'Segoe UI',sans-serif; pointer-events:none; font-size:11px; }
.link-family { fill:none; stroke:#c8b87a; stroke-width:2px; opacity:0.8; }
.link-spouse { fill:none; stroke:#e07b39; stroke-width:2px; opacity:0.8; stroke-dasharray:6,3; }

::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:#0f1923; } ::-webkit-scrollbar-thumb { background:#2a4a2a; border-radius:2px; }
</style>
</head>
<body>
<div class="header">
  <div><div class="header-title">THE PARK CONSERVATION TRUST</div><div class="header-sub">Family Trees &amp; Bloodlines</div></div>
  <nav class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/">Map</a>
    <a href="/people">People</a>
    <a href="/family-tree" class="active">Family Trees</a>
  </nav>
</div>

<div class="layout">
  <!-- Sidebar: people list -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>🌳 Select a Person</h2>
      <input class="search-box" id="personSearch" placeholder="Search by name..." oninput="filterPeople(this.value)">
    </div>
    <div class="people-list" id="peopleList"><div style="padding:1rem;color:#5a7a5a;font-size:0.8rem;text-align:center">Loading...</div></div>
  </div>

  <!-- Tree canvas -->
  <div class="tree-area" id="treeArea">
    <svg class="tree-svg" id="treeSvg"></svg>

    <div class="no-sel" id="noSel">
      <div class="icon">🌳</div>
      <p>Select a person to see their family tree</p>
    </div>

    <!-- Detail card bottom-left -->
    <div class="detail-card" id="detailCard">
      <button class="dc-close" onclick="document.getElementById('detailCard').classList.remove('show')">✕</button>
      <div class="dc-name" id="dc-name"></div>
      <div class="dc-dates" id="dc-dates"></div>
      <div class="dc-row"><div class="dc-label">Occupation</div><div class="dc-value" id="dc-occ">—</div></div>
      <div class="dc-row"><div class="dc-label">Born</div><div class="dc-value" id="dc-born">—</div></div>
      <div class="dc-links" id="dc-links"></div>
    </div>

    <!-- Zoom controls -->
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoomBy(1.3)">+</button>
      <button class="zoom-btn" onclick="zoomBy(0.77)">−</button>
      <button class="zoom-btn" onclick="resetZoom()" title="Reset">⟳</button>
    </div>

    <!-- Legend -->
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#c8b87a;border:2px solid #c8b87a"></div> Selected</div>
      <div class="leg-item"><div class="leg-dot" style="background:#4caf8233;border:2px solid #4caf82"></div> Family</div>
      <div class="leg-item"><div class="leg-line" style="background:#c8b87a"></div> Parent/Child</div>
      <div class="leg-item"><div class="leg-line" style="background:#e07b39;border-top:2px dashed #e07b39;background:none;height:0"></div> Spouse</div>
    </div>
  </div>

  <!-- Household panel: right side -->
  <div class="household-panel" id="householdPanel">
    <div class="hp-header">
      <h3>🏠 Household Members</h3>
      <p>Same property — not blood relatives</p>
    </div>
    <div class="hp-list" id="householdList"></div>
  </div>
</div>

<script>
let allPeople = [], svg, g, zoomBeh, currentId = null;

// Relationship types that are bloodlines / marriage
const FAMILY_RELS = ['parent','child','mother','father','son','daughter','sibling','brother','sister','grandparent','grandmother','grandfather','grandchild','grandson','granddaughter','nephew','niece','uncle','aunt','cousin','spouse','wife','husband','partner'];

function isBloodOrMarriage(relType) {
  if (!relType) return false;
  const t = relType.toLowerCase();
  return FAMILY_RELS.some(r => t.includes(r));
}
function isSpouse(relType) {
  if (!relType) return false;
  const t = relType.toLowerCase();
  return ['spouse','wife','husband','partner','married'].some(r => t.includes(r));
}

async function init() {
  try {
    const res = await fetch('/api/people');
    const data = await res.json();
    if (!data || !data.length) { showNoDB(); return; }
    allPeople = data;
    renderList(allPeople);
  } catch(e) { showNoDB(); }
}

function showNoDB() {
  document.getElementById('noSel').innerHTML = `<div class="icon">🔌</div><p style="color:#8a9a7a">Database not connected.<br>Deploy to Railway to use this feature.</p><a href="/dashboard" style="color:#c8b87a;font-size:0.8rem;margin-top:0.5rem">← Dashboard</a>`;
  document.getElementById('peopleList').innerHTML = '<div style="padding:1rem;color:#5a7a5a;font-size:0.8rem;text-align:center">No database</div>';
}

function renderList(people) {
  document.getElementById('peopleList').innerHTML = people.length
    ? people.map(p => `<div class="person-item" id="pi-${p.id}" onclick="loadTree(${p.id})">
        <div class="person-name">${nameOf(p)}</div>
        <div class="person-dates">${dateStr(p)}</div>
      </div>`).join('')
    : '<div style="padding:1rem;color:#5a7a5a;font-size:0.8rem">No results</div>';
}

function filterPeople(q) {
  renderList(q ? allPeople.filter(p => nameOf(p).toLowerCase().includes(q.toLowerCase())) : allPeople);
}

async function loadTree(id) {
  currentId = id;
  document.querySelectorAll('.person-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('pi-' + id);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest'}); }
  document.getElementById('noSel').style.display = 'none';

  try {
    const person = await fetch('/api/person/' + id).then(r => r.json());
    if (!person || person.error) return;

    // Separate family relationships from household
    const familyRels = (person.relationships || []).filter(r => isBloodOrMarriage(r.relationship_type));
    const otherRels  = (person.relationships || []).filter(r => !isBloodOrMarriage(r.relationship_type));

    // Build nodes & links for family tree only
    const nodes = [], links = [];
    const centerNode = { id: person.id, name: nameOf(person), dates: dateStr(person), occ: topOcc(person), type: 'center', person };
    nodes.push(centerNode);

    familyRels.forEach(rel => {
      const isA = rel.person_a_id === id;
      const otherId = isA ? rel.person_b_id : rel.person_a_id;
      const otherName = isA ? [rel.b_known || rel.b_first, rel.b_last] : [rel.a_known || rel.a_first, rel.a_last];
      if (!nodes.find(n => n.id === otherId)) {
        nodes.push({ id: otherId, name: otherName.filter(Boolean).join(' '), type: isSpouse(rel.relationship_type) ? 'spouse' : 'family', rel: rel.relationship_type });
        links.push({ source: id, target: otherId, type: isSpouse(rel.relationship_type) ? 'spouse' : 'family' });
      }
    });

    drawTree(nodes, links, person);
    showDetail(person);

    // Household panel: people who lived at same properties but aren't family
    const propIds = [...new Set((person.census_entries || []).map(c => c.property_id).filter(Boolean))];
    let houseMembers = [];
    if (propIds.length) {
      const results = await Promise.all(propIds.map(pid => fetch('/api/people-at-property/' + pid).then(r=>r.json()).catch(()=>[])));
      const familyIds = new Set(nodes.map(n => n.id));
      results.forEach(arr => {
        (arr || []).forEach(p => {
          if (!familyIds.has(p.id) && !houseMembers.find(h => h.id === p.id)) {
            houseMembers.push(p);
          }
        });
      });
    }
    renderHousehold(houseMembers, person.census_entries || []);

  } catch(e) { console.error(e); }
}

function renderHousehold(members, censusEntries) {
  const panel = document.getElementById('householdPanel');
  const list = document.getElementById('householdList');
  if (!members.length) { panel.classList.remove('show'); return; }
  panel.classList.add('show');
  list.innerHTML = members.map(m => {
    const entry = censusEntries.find(c => c.person_id === m.id);
    const role = entry ? entry.household_role || '' : '';
    return `<div class="hp-person" onclick="loadTree(${m.id})">
      <div class="hp-name">${nameOf(m)}</div>
      ${role ? `<div class="hp-role">${role}</div>` : ''}
    </div>`;
  }).join('');
}

function drawTree(nodes, links, centerPerson) {
  const area = document.getElementById('treeArea');
  const W = area.clientWidth, H = area.clientHeight;
  d3.select('#treeSvg').selectAll('*').remove();
  svg = d3.select('#treeSvg');
  zoomBeh = d3.zoom().scaleExtent([0.15, 3]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoomBeh);
  g = svg.append('g');

  // Defs: arrowhead
  const defs = svg.append('defs');
  defs.append('marker').attr('id','arrow').attr('viewBox','0 -4 8 8').attr('refX',18).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
    .append('path').attr('d','M0,-4L8,0L0,4').attr('fill','#c8b87a').attr('opacity',0.6);

  // Links
  const link = g.selectAll('line').data(links).enter().append('line')
    .attr('class', d => d.type === 'spouse' ? 'link-spouse' : 'link-family');

  // Nodes
  const colOf = d => d.type==='center' ? '#c8b87a' : d.type==='spouse' ? '#e07b39' : '#4caf82';
  const rOf = d => d.type==='center' ? 28 : 20;

  const node = g.selectAll('.node').data(nodes).enter().append('g').attr('class','node')
    .on('click', (e, d) => { if (d.id === currentId) return; loadTree(d.id); })
    .call(d3.drag().on('start', dragStart).on('drag', dragged).on('end', dragEnd));

  node.append('circle').attr('r', rOf)
    .style('fill', d => colOf(d) + '22')
    .style('stroke', colOf);

  // Initials in circle
  node.append('text').attr('text-anchor','middle').attr('dy','0.35em')
    .style('fill', colOf).style('font-weight','700').style('font-size', d => d.type==='center'?'13px':'11px')
    .text(d => initials(d.name));

  // Name below
  node.append('text').attr('class','name').attr('text-anchor','middle')
    .attr('dy', d => rOf(d) + 15).style('fill','#e8e0d0').style('font-size','11px')
    .text(d => d.name.split(' ').pop());

  // Date below name
  node.append('text').attr('text-anchor','middle')
    .attr('dy', d => rOf(d) + 27).style('fill','#8a9a7a').style('font-size','10px')
    .text(d => d.dates || '');

  // Relationship label on links
  const linkLabel = g.selectAll('.linklabel').data(links).enter().append('text')
    .attr('text-anchor','middle').style('fill','#8a7a4a').style('font-size','9px').style('pointer-events','none')
    .text(d => d.type !== 'family' ? (d.type||'') : '');

  // Force layout
  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(d => d.type==='spouse' ? 90 : 110))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide(55))
    .on('tick', () => {
      link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
          .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      node.attr('transform', d=>`translate(${d.x},${d.y})`);
      linkLabel.attr('x', d=>(d.source.x+d.target.x)/2).attr('y', d=>(d.source.y+d.target.y)/2-6);
    });

  function dragStart(event,d){ if(!event.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
  function dragged(event,d){ d.fx=event.x; d.fy=event.y; }
  function dragEnd(event,d){ if(!event.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }
}

function showDetail(person) {
  const card = document.getElementById('detailCard');
  document.getElementById('dc-name').textContent = nameOf(person);
  document.getElementById('dc-dates').textContent = dateStr(person);
  document.getElementById('dc-occ').textContent = topOcc(person) || '—';
  document.getElementById('dc-born').textContent = [person.born_place, person.born_year ? '('+person.born_year+')' : ''].filter(Boolean).join(' ') || '—';
  const links = [];
  if (person.wikipedia_url) links.push(`<a href="${person.wikipedia_url}" target="_blank" class="dc-link">Wikipedia →</a>`);
  links.push(`<a href="/people?id=${person.id}" class="dc-link">Full profile →</a>`);
  if (person.census_entries && person.census_entries[0] && person.census_entries[0].property_id)
    links.push(`<a href="/?id=${person.census_entries[0].property_id}" class="dc-link">View property →</a>`);
  document.getElementById('dc-links').innerHTML = links.join('');
  card.classList.add('show');
}

function nameOf(p) { return [p.known_as||p.first_name, p.last_name].filter(Boolean).join(' ') || 'Unknown'; }
function dateStr(p) { return (p.born_year||p.died_year) ? `${p.born_year||'?'} – ${p.died_year||''}` : ''; }
function topOcc(p) { return p.occupations && p.occupations[0] ? p.occupations[0].occupation : ''; }
function initials(name) { return name.split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase(); }

function zoomBy(f) { svg.transition().duration(300).call(zoomBeh.scaleBy, f); }
function resetZoom() { svg.transition().duration(500).call(zoomBeh.transform, d3.zoomIdentity.translate(0,0).scale(1)); }

init();
</script>
</body>
</html>
